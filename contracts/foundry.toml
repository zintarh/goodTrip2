[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
via_ir = true
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
celoSepolia = "${CELO_SEPOLIA_RPC}"
celo = "${CELO_MAINNET_RPC}"

[etherscan]
# Celo Sepolia's explorer is Blockscout, not Celoscan — no API key required.
celoSepolia = { key = "", url = "https://celo-sepolia.blockscout.com/api" }
celo = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api" }
